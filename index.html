<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dokumenty</title>
    <style>
        :root {
            --bg-color: #f2f2f7; /* Jasnoszary/złamana biel */
            --text-color: #000000;
            --accent-color: #d32f2f; /* Czerwony */
            --bottom-bar-bg: #ffffff;
            --bottom-bar-inactive: #8e8e93;
            --bottom-bar-active: #d32f2f;
            --card-gradient: linear-gradient(135deg, #0a1f3c 0%, #a41732 100%); /* Ciemnoniebieski do czerwono-różowego */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px; /* Miejsce na bottom nav */
        }

        .container {
            padding: 24px 20px;
            flex: 1;
        }

        /* Godło icon svg */
        .godlo-icon {
            width: 38px;
            height: 42px;
            margin-bottom: 24px;
            object-fit: contain;
        }

        .header-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header-action {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .action-add {
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
        }

        /* Card styles */
        .card {
            background: var(--card-gradient);
            border-radius: 20px;
            padding: 24px 20px;
            min-height: 220px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            overflow: hidden;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .card-godlo {
            width: 28px;
            height: 32px;
            margin-bottom: 0;
            object-fit: contain;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bottom-bar-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 28px 0; /* padding dla iPhone */
            border-top: 1px solid rgba(0,0,0,0.08); /* Delikatne obramowanie bez agresywnych cieni */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--bottom-bar-inactive);
            text-decoration: none;
            gap: 6px;
            flex: 1;
        }

        .nav-item.active {
            color: var(--bottom-bar-active);
        }

        .nav-icon {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Godło w lewym górnym rogu -->
        <img src="orzel.png" alt="Godło" class="godlo-icon">

        <!-- Nagłówek -->
        <h1 class="header-title">Dokumenty</h1>
        
        <!-- Tekst Dodaj pod nagłówkiem (do prawej) -->
        <div class="header-action">
            <a href="#" class="action-add">Dodaj</a>
        </div>

        <!-- Karta -->
        <a href="legitymacja.html" style="text-decoration: none; color: inherit; display: block;">
            <div class="card">
                <div class="card-top">
                    <span class="card-title">Legitymacja szkolna</span>
                    <!-- Godło w prawym górnym rogu karty -->
                    <img src="orzel.png" alt="Godło" class="card-godlo">
                </div>
            </div>
        </a>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <!-- Pulpit (Aktywny, domek) -->
        <a href="#" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span class="nav-label">Pulpit</span>
        </a>
        <!-- Ustawienia (Nieaktywne, zębatka) -->
        <a href="settings.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
            <span class="nav-label">Ustawienia</span>
        </a>
    </nav>
</body>
</html>
