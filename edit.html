<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edytuj dane</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --text-color: #000000;
            --accent-color: #f26622;
            --input-bg: #ffffff;
            --border-color: #c6c6c8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .btn-back {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            background: var(--input-bg);
            border-radius: 10px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 0.5px solid var(--border-color);
        }

        .input-row {
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border-color);
        }

        .input-row:last-child {
            border-bottom: none;
        }

        label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 4px;
        }

        input {
            border: none;
            font-size: 17px;
            outline: none;
            width: 100%;
            background: transparent;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-size: 17px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(242, 102, 34, 0.2);
        }

        .btn-save:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="legitymacja.html" class="btn-back">Anuluj</a>
        <h1>Edytuj dane</h1>
        <div style="width: 50px;"></div> <!-- Spacer -->
    </div>

    <form id="editForm">
        <div class="form-group">
            <div class="input-row">
                <label for="firstName">Imię (imiona)</label>
                <input type="text" id="firstName" name="firstName" placeholder="np. KRZYSZTOF">
            </div>
            <div class="input-row">
                <label for="lastName">Nazwisko</label>
                <input type="text" id="lastName" name="lastName" placeholder="np. KOWALSKI">
            </div>
        </div>

        <div class="form-group">
            <div class="input-row">
                <label for="birthDate">Data urodzenia</label>
                <input type="text" id="birthDate" name="birthDate" placeholder="np. 16.08.2013">
            </div>
            <div class="input-row">
                <label for="pesel">Numer PESEL</label>
                <input type="text" id="pesel" name="pesel" placeholder="np. 13281655531">
            </div>
        </div>

        <div class="form-group">
            <div class="input-row">
                <label for="idNumber">Numer legitymacji</label>
                <input type="text" id="idNumber" name="idNumber" placeholder="np. 4322/44">
            </div>
            <div class="input-row">
                <label for="issueDate">Data wydania</label>
                <input type="text" id="issueDate" name="issueDate" placeholder="np. 25.09.2025">
            </div>
            <div class="input-row">
                <label for="expiryDate">Termin ważności</label>
                <input type="text" id="expiryDate" name="expiryDate" placeholder="np. 30.09.2026">
            </div>
        </div>

        <button type="submit" class="btn-save">Zapisz zmiany</button>
    </form>

    <script>
        const form = document.getElementById('editForm');
        
        // Load existing data
        window.addEventListener('load', () => {
            const savedData = localStorage.getItem('legitymacjaData');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('firstName').value = data.firstName || '';
                document.getElementById('lastName').value = data.lastName || '';
                document.getElementById('birthDate').value = data.birthDate || '';
                document.getElementById('pesel').value = data.pesel || '';
                document.getElementById('idNumber').value = data.idNumber || '';
                document.getElementById('issueDate').value = data.issueDate || '';
                document.getElementById('expiryDate').value = data.expiryDate || '';
            } else {
                // Default values if no data in localStorage
                document.getElementById('firstName').value = 'KRZYSZTOF';
                document.getElementById('lastName').value = 'KOWALSKI';
                document.getElementById('birthDate').value = '16.08.2013';
                document.getElementById('pesel').value = '13281655531';
                document.getElementById('idNumber').value = '4322/44';
                document.getElementById('issueDate').value = '25.09.2025';
                document.getElementById('expiryDate').value = '30.09.2026';
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                birthDate: document.getElementById('birthDate').value,
                pesel: document.getElementById('pesel').value,
                idNumber: document.getElementById('idNumber').value,
                issueDate: document.getElementById('issueDate').value,
                expiryDate: document.getElementById('expiryDate').value
            };
            localStorage.setItem('legitymacjaData', JSON.stringify(formData));
            window.location.href = 'legitymacja.html';
        });
    </script>
</body>
</html>
